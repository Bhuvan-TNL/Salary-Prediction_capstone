<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salary Prediction App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
      width: 500px;
    }
    .card-header {
      background: #007bff;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
    }
    .btn-primary {
      background: #007bff;
      border: none;
      font-weight: bold;
    }
    .prediction-box {
      margin-top: 20px;
      font-size: 1.3rem;
      font-weight: bold;
      text-align: center;
      color: green;
    }
  </style>
</head>

<body>
  <div class="card p-4">
    <div class="card-header">💼 Salary Prediction</div>
    <div class="card-body">
      <form action="/predict" method="post">

        <!-- Total Experience -->
        <div class="mb-3">
          <label class="form-label">Total Experience (years)</label>
          <input type="number" name="total_exp" step="0.1" class="form-control" required>
        </div>

        <!-- Field Experience -->
        <div class="mb-3">
          <label class="form-label">Field Experience (years)</label>
          <input type="number" name="field_exp" step="0.1" class="form-control" required>
        </div>

        <!-- Degree -->
        <div class="mb-3">
          <label class="form-label">Degree</label>
          <select name="degree" class="form-select" required>
            <option value="B.Tech">B.Tech</option>
            <option value="M.Tech">M.Tech</option>
            <option value="B.Sc">B.Sc</option>
            <option value="BBA">BBA</option>
            <option value="MBA">MBA</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Skills -->
        <div class="mb-3">
          <label class="form-label">Skills</label><br>
          <input type="checkbox" name="skills" value="Python"> Python
          <input type="checkbox" name="skills" value="Java"> Java
          <input type="checkbox" name="skills" value="C++"> C++
          <input type="checkbox" name="skills" value="SQL"> SQL
          <input type="checkbox" name="skills" value="MongoDB"> MongoDB 
          <input type="checkbox" name="skills" value="JavaScript"> JavaScript
          <input type="checkbox" name="skills" value="Other"> Other
        </div>

        <!-- Job Role -->
        <div class="mb-3">
          <label class="form-label">Job Role</label>
          <select name="job_role" class="form-select" required>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Data Analyst">Data Analyst</option>
            <option value="Python Developer">Python Developer</option>
            <option value="Data Scientist">Data Scientist</option>
            <option value="Business Analyst">Business Analyst</option>
            <option value="Project Manager">Project Manager</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Industry -->
        <div class="mb-3">
          <label class="form-label">Industry</label>
          <select name="industry" class="form-select" required>
            <option value="IT">IT</option>
            <option value="Finance">Finance</option>
            <option value="Healthcare">Healthcare</option>
            <option value="Manufacturing">Manufacturing</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary w-100">Predict Salary</button>
      </form>

      <!-- Prediction Output -->
      {% if prediction_text %}
      <div class="prediction-box">{{ prediction_text }}</div>
      {% endif %}
    </div>
  </div>
</body>
</html>
